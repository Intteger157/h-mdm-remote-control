---

- name: Install prerequisites
  hosts: localhost
  connection: local
  become: yes
  vars_files:
    - config.build.yaml
    - config.defaults.yaml
    - ../config.yaml
  vars:
    compose_project_src: "{{ playbook_dir }}/.."
    use_modern_docker_repo: true

  tasks:

  - name: Checking Linux distro
    ansible.builtin.debug:
      msg:
        - "Distro name: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  - name: Prepare Python 3
    ansible.builtin.import_tasks: tasks_python.yaml

  - name: Install required system packages
    ansible.builtin.package:
      name:
        - git
        - ca-certificates
        - curl
      update_cache: yes
      state: latest

  - name: Install Python dependencies from apt
    ansible.builtin.apt:
      name:
        - python3-docker
        - python3-dnspython
      state: present

  - name: Install Docker on Ubuntu/Debian
    ansible.builtin.import_tasks: tasks_docker_ubuntu.yaml
    when: ansible_distribution == 'Ubuntu' or ansible_distribution == 'Debian'

  - name: Install Docker on CentOS
    ansible.builtin.import_tasks: tasks_docker_centos.yaml
    when: ansible_distribution == 'CentOS'

  - name: Warning about manual Docker installation
    ansible.builtin.debug:
      msg: "I do not know how to install Docker on your OS! Please install docker manually."
    when: ansible_distribution != 'Ubuntu' and ansible_distribution != 'Debian' and ansible_distribution != 'CentOS'

  - name: Ensure Docker is started and enabled at boot
    ansible.builtin.service:
      name: docker
      state: started
      enabled: true

  - name: Ensure current user is added to the docker group
    ansible.builtin.user:
      name: "{{ lookup('env', 'USER') }}"
      groups: docker
      append: true
    when: ansible_user_id != 'root'
