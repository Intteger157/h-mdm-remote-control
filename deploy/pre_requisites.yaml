---

- name: Install prerequisites
  hosts: localhost
  connection: local
  become: yes
  vars_files:
    - config.build.yaml
    - config.defaults.yaml
    - ../config.yaml
  vars:
    compose_project_src: "{{ playbook_dir }}/.."
    is_modern_platform: >-
      {{ (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version | int >= 22)
         or (ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 12) }}
    use_modern_docker_repo: "{{ is_modern_platform }}"

  tasks:

  - name: Checking Linux distro
    ansible.builtin.debug:
      msg:
        - "Distro name: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  - name: Prepare Python 3
    ansible.builtin.import_tasks: tasks_python.yaml

  - name: Install required system packages
    ansible.builtin.package:
      name:
        - git
        - ca-certificates
        - curl
      update_cache: yes
      state: latest

  - name: Install Python dependencies from apt (modern platforms)
    ansible.builtin.apt:
      name:
        - python3-docker
        - python3-dnspython
      state: present
    when: is_modern_platform | bool

  - name: Install required python packages (legacy platforms)
    ansible.builtin.pip:
      name:
        - docker==4.3.1
        - docker-compose==1.27.4
        - dnspython==1.16.0
        - jsonschema==3.0.2
    when: not (is_modern_platform | bool)

  - name: Install Docker on Ubuntu/Debian
    ansible.builtin.import_tasks: tasks_docker_ubuntu.yaml
    when: ansible_distribution == 'Ubuntu' or ansible_distribution == 'Debian'

  - name: Install Docker on CentOS
    ansible.builtin.import_tasks: tasks_docker_centos.yaml
    when: ansible_distribution == 'CentOS'

  - name: Warning about manual Docker installation
    ansible.builtin.debug:
      msg: "I do not know how to install Docker on your OS! Please install docker manually."
    when: ansible_distribution != 'Ubuntu' and ansible_distribution != 'Debian' and ansible_distribution != 'CentOS'

  - name: Ensure Docker is started and enabled at boot
    ansible.builtin.service:
      name: docker
      state: started
      enabled: true

  - name: Ensure current user is added to the docker group
    ansible.builtin.user:
      name: "{{ lookup('env', 'USER') }}"
      groups: docker
      append: true
    when: ansible_user_id != 'root'

  - name: Download docker-compose v1 binary (legacy platforms)
    ansible.builtin.get_url:
      url: https://github.com/docker/compose/releases/download/1.26.0/docker-compose-{{ ansible_system }}-{{ ansible_machine }}
      dest: /usr/local/bin/docker-compose
      mode: 0755
      force: yes
    when: not (is_modern_platform | bool)

  - name: Download docker-compose autocompletion (legacy bash)
    ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/docker/compose/1.26.0/contrib/completion/bash/docker-compose
      dest: /etc/bash_completion.d/docker-compose
    when:
      - not (is_modern_platform | bool)
      - "'/bash' in ansible_user_shell"
