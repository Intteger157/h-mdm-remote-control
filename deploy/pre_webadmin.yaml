---

- name: Prepare web admin application
  hosts: localhost
  connection: local
  vars_files:
    - config.build.yaml
    - config.defaults.yaml
    - ../config.yaml
  vars:
    is_modern_platform: >-
      {{ (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version | int >= 22)
         or (ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 12) }}

  tasks:
    - name: Prepare Python 3
      ansible.builtin.import_tasks: tasks_python.yaml

    - name: Get builder image for web-admin (modern)
      community.docker.docker_image:
        name: "{{ node_gulp_builder_image_publisher }}/{{ node_gulp_builder_image_name }}:{{ node_gulp_builder_image_tag }}"
        source: pull
      when: is_modern_platform | bool

    - name: Get builder image for web-admin (legacy)
      docker_image:
        name: "{{ node_gulp_builder_image_publisher }}/{{ node_gulp_builder_image_name }}:{{ node_gulp_builder_image_tag }}"
        source: pull
      when: not (is_modern_platform | bool)

    - name: Start build web-admin (modern)
      community.docker.docker_container:
        image: "{{ node_gulp_builder_image_publisher }}/{{ node_gulp_builder_image_name }}:{{ node_gulp_builder_image_tag }}"
        name: "{{ node_gulp_builder_image_name }}-container"
        state: started
        volumes:
          - ../web-admin:/app
      when: is_modern_platform | bool

    - name: Start build web-admin (legacy)
      docker_container:
        image: "{{ node_gulp_builder_image_publisher }}/{{ node_gulp_builder_image_name }}:{{ node_gulp_builder_image_tag }}"
        name: "{{ node_gulp_builder_image_name }}-container"
        state: started
        volumes:
          - ../web-admin:/app
      when: not (is_modern_platform | bool)

    - name: Waiting until web-admin is ready
      ansible.builtin.wait_for:
        path: ../web-admin/dist/js/app.min.js
        state: present
        delay: 5
        timeout: 300

    - name: Remove builder (modern)
      community.docker.docker_container:
        name: "{{ node_gulp_builder_image_name }}-container"
        state: absent
      when: is_modern_platform | bool

    - name: Remove builder (legacy)
      docker_container:
        name: "{{ node_gulp_builder_image_name }}-container"
        state: absent
      when: not (is_modern_platform | bool)

    - name: Release web-admin assets
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      with_items:
        - { src: '../web-admin/dist', dest: './dist/web-admin/' }
        - { src: '../web-admin/static', dest: './dist/web-admin/' }
        - { src: '../web-admin/index.html', dest: './dist/web-admin/' }
