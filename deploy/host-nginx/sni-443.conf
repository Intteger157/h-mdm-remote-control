# SNI routing for MDM + Headwind Remote on the same VPS (port 443).
# Install: see deploy/host-nginx/README.md
#
# Edit backend ports if your setup differs:
#   remote_https_port  — web_https_port from config.yaml (default 9443 when MDM uses 443)
#   mdm_https_port     — MDM Tomcat after moving to 127.0.0.1:8443:8443

map $ssl_preread_server_name $sni_backend {
    remote.example.com   127.0.0.1:9443;
    mdm.example.com      127.0.0.1:8443;
    default                   127.0.0.1:8443;
}

server {
    listen 443;
    listen [::]:443;
    proxy_pass $sni_backend;
    ssl_preread on;
    proxy_connect_timeout 10s;
}
