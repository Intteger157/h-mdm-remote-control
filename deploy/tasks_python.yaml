- name: Install python3 runtime packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-apt
      - python3-setuptools
      - python3-pip
    state: present
    update_cache: true
    # Reuse a recent cache so transient mirror blips do not fail every install.sh run.
    cache_valid_time: 3600
  register: python3_apt_install
  retries: 5
  delay: 15
  until: python3_apt_install is succeeded

- name: Process Python 2 for backward compatibility
  block:
    - name: Install python2 pip
      ansible.builtin.package:
        name:
          - python-pip
          - python-netaddr
        state: latest

    - name: Install dnslookup library for python2
      ansible.builtin.pip:
        name:
          - dnspython==1.16.0
        executable: pip2
  when: ansible_python.version.major | int == 2

- name: Set Python 3 interpreter for legacy Ansible controller
  block:
    - name: Get Python 3 path
      ansible.builtin.command: which python3
      register: python3_abs_path
      changed_when: false

    - name: Get Python 3 version
      ansible.builtin.command: python3 -c "import platform; print(platform.python_version())"
      register: python3_version
      changed_when: false

    - name: Set Python 3 interpreter for deployment
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ python3_abs_path.stdout }}"

    - name: Set Python 3 interpreter version
      ansible.builtin.set_fact:
        ansible_python_version: "{{ python3_version.stdout }}"
  when: ansible_python.version.major | int == 2
