- name: Install required system packages by apt
  block:
    - name: Remove stale Docker apt source referencing docker.asc only
      ansible.builtin.shell: |
        set -euo pipefail
        changed=0
        for file in /etc/apt/sources.list.d/docker*; do
          [ -f "$file" ] || continue
          if grep -q 'signed-by=/etc/apt/keyrings/docker.asc' "$file"; then
            rm -f "$file"
            changed=1
          fi
        done
        if [ "$changed" -eq 1 ]; then
          echo changed
        fi
      args:
        executable: /bin/bash
      register: docker_asc_source_cleanup
      changed_when: "'changed' in docker_asc_source_cleanup.stdout"

    - name: Install SSL tools
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        update_cache: yes
        state: present

    - name: Check if Docker CLI is available
      ansible.builtin.command: docker --version
      register: docker_cli_check
      changed_when: false
      failed_when: false

    - name: Check if Docker Compose plugin is available
      ansible.builtin.command: docker compose version
      register: docker_compose_check
      changed_when: false
      failed_when: false

    - name: Find existing Docker apt source files
      ansible.builtin.find:
        paths:
          - /etc/apt/sources.list.d
        patterns:
          - "docker*"
      register: docker_apt_source_files

    - name: Docker already installed
      ansible.builtin.debug:
        msg: "Docker and Compose plugin already present; skipped apt repository setup."
      when:
        - docker_cli_check.rc == 0
        - docker_compose_check.rc == 0

    - name: Configure Docker CE apt repository
      when:
        - docker_cli_check.rc != 0 or docker_compose_check.rc != 0
        - docker_apt_source_files.matched | int == 0
      block:
        - name: Ensure apt keyrings directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Install Docker GPG key (official method)
          ansible.builtin.shell: |
            set -euo pipefail
            curl -fsSL "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg" \
              -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
          args:
            creates: /etc/apt/keyrings/docker.asc
            executable: /bin/bash

        - name: Add docker repository
          ansible.builtin.apt_repository:
            repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
            state: present
            filename: docker
            update_cache: yes

    - name: Ensure Docker packages are installed
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: false
      when: docker_cli_check.rc != 0 or docker_compose_check.rc != 0
